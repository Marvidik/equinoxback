<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #f4f6f8;
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .wrapper {
            padding: 40px 20px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid #eef0f2;
        }

        .top-bar {
            height: 5px;
            background: linear-gradient(90deg, #14b8a6, #2dd4bf);
        }

        .header {
            padding: 32px 40px 0 40px;
        }

        .header img {
            height: 32px;
        }

        .content {
            padding: 24px 40px 32px 40px;
            color: #2b2f33;
        }

        .content h1 {
            font-size: 22px;
            color: #14181c;
            margin: 0 0 16px 0;
        }

        .content p {
            font-size: 15px;
            line-height: 1.6;
            color: #4a4f54;
            margin: 0 0 14px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 8px;
            padding: 12px 22px;
            background-color: #14b8a6;
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
        }

        .divider {
            border-top: 1px solid #eef0f2;
            margin: 8px 40px;
        }

        .footer {
            padding: 24px 40px 32px 40px;
            font-size: 13px;
            color: #8a9099;
        }

        .footer a {
            color: #14b8a6;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="top-bar"></div>
            <div class="header">
                <img src="{{ logo_url }}" alt="Equinox Global Assets">
            </div>
            <div class="content">
                <h1>{{ subject }}</h1>
                <p>Hello {{ user_name }},</p>
                <div>{{ message|safe }}</div>
            </div>
            <div class="divider"></div>
            <div class="footer">
                <p style="margin-bottom: 6px;">Having trouble with your account? <a
                        href="mailto:support@equinoxglobalassets.com">Contact us</a></p>
                <p style="margin-bottom: 0;">Please keep your login credentials safe. We will never ask for your
                    password, OTP, or personal codes.</p>
                <p style="margin-top: 16px; margin-bottom: 0;">Best,<br>~ Equinox Global Assets Team</p>
            </div>
        </div>
    </div>
</body>

</html>
